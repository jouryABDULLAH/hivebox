apiVersion: apps/v1
kind: Deployment
metadata:
  name:  {{ include "hivebox.fullname" . }}
  labels:
    app: {{ include "hivebox.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "hivebox.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "hivebox.name" . }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "hivebox.serviceAccountName" . }}
      containers:
        - name: {{ include "hivebox.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # for now secrets will be applied via kubectl
          # envFrom:
          #   - secretRef:
          #       name: hivebox-secret