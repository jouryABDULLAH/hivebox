name: HiveBox CI workflow
run-name: "HiveBox CI – ${{ github.ref_name }}"
on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'requirements.txt'

permissions:
  contents: read
  security-events: write
  id-token: write


jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses:  actions/setup-python@v5
        with: 
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint Python code
        run: |
          pip install flake8
          flake8 . || true

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0

      - name: Run unit tests
        working-directory: ${{ github.workspace }}
        run: |
          pip install pytest httpx 
          pytest tests/unit/ -v

      - name: Run integration tests
        run: |
          pip install pytest httpx 
          pytest tests/integration/ -v

      - name: Build Docker image
        run: docker build -t hivebox-api .

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.3.1
        with: 
          results_file: results.sarif

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3  
      
      - name: Run Terrascan
        run: |
          curl -L "https://github.com/tenable/terrascan/releases/download/v1.19.1/terrascan_1.19.1_Linux_x86_64.tar.gz" | tar -xz
          ./terrascan scan -d k8s/ -i k8s || true
        # uses: tenable/terrascan-action@v1.5.0
        # with:
        #   iac_type: k8s
        #   iac_dir: k8s/
        #   only_warn: true

  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

