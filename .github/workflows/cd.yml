name: HiveBox CD workflow
run-name: "HiveBox CD – ${{ github.ref_name }}"

on:
  push:
    branches: ["main"]


concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_VERSION: 0.0.3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create values-secrets.yaml
        run: |
          cat <<EOF > values-secrets.yaml
          secrets:
            MINIO_ACCESS_KEY: "${{ secrets.MINIO_ACCESS_KEY }}"
            MINIO_SECRET_KEY: "${{ secrets.MINIO_SECRET_KEY }}"
            MINIO_ENDPOINT: "${{ secrets.MINIO_ENDPOINT }}"
            REDIS_HOST: "${{ secrets.REDIS_HOST }}"
            REDIS_PORT: "${{ secrets.REDIS_PORT }}"
            SENSEBOX_IDS_RAW: "${{ secrets.SENSEBOX_IDS_RAW }}"
          EOF

      # - name: Create values-secrets.yaml
      #   run: |
      #     cat <<EOF > values-secrets.yaml
      #     minio:
      #       accessKey: "${{ secrets.MINIO_ACCESS_KEY }}"
      #       secretKey: "${{ secrets.MINIO_SECRET_KEY }}"
      #       endpoint: "${{ secrets.MINIO_ENDPOINT }}"

      #     redis:
      #       host: "${{ secrets.REDIS_HOST }}"
      #       port: "${{ secrets.REDIS_PORT }}"

      #     hivebox:
      #       senseboxIdsRaw: "${{ secrets.SENSEBOX_IDS_RAW }}"
      #     EOF


      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/hivebox:${{ env.APP_VERSION }}
            ghcr.io/${{ env.OWNER }}/hivebox:${{ github.sha }}
      

      - name: Authenticate to GKE
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1066958358457/locations/global/workloadIdentityPools/github/providers/githubactions
          service_account: github-deployer@hivebox-495409.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: |
         gcloud container clusters get-credentials hivebox-gke --region us-central1 --project hivebox-495409

      - name: Set up Helm
        uses: azure/setup-helm@v4 

      - name: Install kustomize
        shell: bash
        run: |
          set -euo pipefail

          VERSION="v5.8.1"
          ARCH=$(uname -m)

          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac

          URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${VERSION}/kustomize_${VERSION}_linux_${ARCH}.tar.gz"

          curl -fsSL "$URL" -o kustomize.tar.gz

          tar -xzf kustomize.tar.gz

          chmod +x kustomize

          mkdir -p "$HOME/bin"
          mv kustomize "$HOME/bin"

          echo "$HOME/bin" >> "$GITHUB_PATH"

          "$HOME/bin/kustomize" version


      - name: deploy infre resources
        run: |
          kustomize build ../k8s/infra/overlays/dev --enable-helm | kubectl apply -f -


      - name: Deploy to GKE
        run: |
          helm upgrade --install hivebox ./helm/hivebox \
            -f values.yaml \
            -f values-secrets.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m \
            --atomic

      - name: Verify deployment
        run: kubectl rollout status deployment/hivebox
      
      # - name: Get Ingress IP
      #   id: ingress
      #   run: |
      #     IP=$(kubectl get ingress hivebox -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
      #     echo "IP=$IP" >> $GITHUB_OUTPUT

      - name: Wait for Load Balancer IP
        id: ingress
        run: |
          for i in {1..30}; do
            IP=$(kubectl get ingress hivebox -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$IP" ]; then
              echo "Load balancer ready: $IP"
              echo "IP=$IP" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for ingress IP... (attempt $i/30)"
            sleep 10
          done
          echo "Timed out waiting for ingress IP"
          exit 1


      - name: Quick health check
        run: curl -f http://${{ steps.ingress.outputs.IP }}/version || exit 1

      - name: Install Venom
        run: |
          curl -fsSL https://github.com/ovh/venom/releases/download/v1.3.0/venom.linux-amd64 -o /usr/local/bin/venom
          chmod +x /usr/local/bin/venom

      - name: Run e2e tests
        run: venom run ./tests/e2e/hivebox.venom.yml --var="base_url=http://${{ steps.ingress.outputs.IP }}"

      - name: Cleanup secrets
        if: always()
        run: rm -f values-secrets.yaml