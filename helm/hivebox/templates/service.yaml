apiVersion: v1
kind: Service
metadata:
  name: {{ include "hivebox.fullname" . }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}' # Create a NEG for this Service so the Load Balancer can attach to it.
  labels:
    {{- include "hivebox.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "hivebox.name" . }}