apiVersion: apps/v1
kind: Deployment
metadata:
  name:  {{ include "hivebox.fullname" . }}
  labels:
    app: {{ include "hivebox.name" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "hivebox.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "hivebox.name" . }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/metrics.portNumber: "8000"
        k8s.grafana.com/metrics.path: "/metrics"
    spec:
      serviceAccountName: {{ include "hivebox.serviceAccountName" . }}
      containers:
        - name: {{ include "hivebox.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hivebox.fullname" . }}-secret
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # for now secrets will be applied via kubectl
          # envFrom:
          #   - secretRef:
          #       name: hivebox-secret