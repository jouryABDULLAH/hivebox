name: HiveBox End-to-End Test Suite
vars:
  base_url: http://34.120.x.x  # GKE external IP placeholder, Exported it through the terminal after deployment

testcases:
- name: Test version endpoint
  steps:
  - type: http
    method: GET
    url: "{{.base_url}}/version"
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.version ShouldEqual "0.0.3"

- name: Test temperature endpoint
  steps:
  - type: http
    method: GET
    url: "{{.base_url}}/temperature"
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson ShouldContainKey temperature
    - result.bodyjson ShouldContainKey status

- name: Test metrics endpoint
  steps:
  - type: http
    method: GET
    url: "{{.base_url}}/metrics"
    assertions:
    - result.statuscode ShouldEqual 200
    - result.body ShouldContainSubstring "http_requests_total"

- name: Test store endpoint
  steps:
  - type: http
    method: GET
    url: "{{.base_url}}/store"
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.status ShouldEqual "stored"


- name: Test caching behavior
  steps:
  - name: First request
    type: http
    method: GET
    url: "{{.base_url}}/temperature"
    assertions:
    - result.statuscode ShouldEqual 200
    
  - name: Second request (should still work)
    type: http
    method: GET
    url: "{{.base_url}}/temperature"
    assertions:
    - result.statuscode ShouldEqual 200

- name: Verify Redis connectivity
  steps:
  - type: exec
    script: kubectl exec -it valkey-master-0 -- redis-cli ping
    assertions:
    - result.code ShouldEqual 0
    - result.systemout ShouldContainSubstring "PONG"


